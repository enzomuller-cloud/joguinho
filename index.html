<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🏁 Corrida de Emoticons | Emoji Racers</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', monospace, 'Apple Color Emoji', 'Segoe UI Emoji';
            margin: 0;
            padding: 20px;
        }

        /* Container principal do jogo */
        .game-container {
            background: #2b2b2b;
            border-radius: 64px;
            padding: 24px 20px 20px 20px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5), inset 0 1px 4px rgba(255,255,255,0.2);
            border-bottom: 6px solid #f5c542;
        }

        /* Painel do jogo */
        .game-panel {
            background: #0f0f1c;
            border-radius: 32px;
            padding: 16px 24px;
            box-shadow: inset 0 0 12px #00000055, 0 6px 0 #3a2a1a;
        }

        /* Header com pontuação e recorde */
        .stats {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            background: #010101aa;
            background: #1e1a2f;
            padding: 12px 24px;
            border-radius: 60px;
            margin-bottom: 20px;
            color: #ffeaac;
            text-shadow: 0 2px 2px black;
            font-weight: bold;
            font-size: 1.4rem;
            backdrop-filter: blur(4px);
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .score-box, .best-box {
            background: #00000077;
            padding: 6px 18px;
            border-radius: 3rem;
            display: flex;
            gap: 12px;
            letter-spacing: 1px;
        }

        .score-box span:first-child, .best-box span:first-child {
            font-size: 1.2rem;
            opacity: 0.8;
        }

        .score-value, .best-value {
            font-size: 2rem;
            font-weight: 800;
            font-family: monospace;
            color: #ffd966;
            line-height: 1;
        }

        /* Área da pista */
        .track {
            background-color: #2e241f;
            background-image: repeating-linear-gradient(90deg, 
                rgba(255,215,130,0.3) 0px, 
                rgba(255,215,130,0.3) 4px,
                transparent 4px,
                transparent 20px);
            border-radius: 28px;
            padding: 20px 16px;
            border: 3px solid #ab8e5c;
            box-shadow: inset 0 0 0 3px #5c3e1a, 0 10px 20px rgba(0,0,0,0.3);
        }

        canvas {
            display: block;
            margin: 0 auto;
            background: #3a2a22;
            border-radius: 24px;
            cursor: pointer;
            box-shadow: 0 0 0 4px #f3bc5c, 0 8px 16px black;
        }

        /* Controles abaixo da pista */
        .controls {
            margin-top: 24px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        button {
            background: #ffeecc;
            border: none;
            font-size: 2rem;
            padding: 10px 28px;
            border-radius: 60px;
            font-weight: bold;
            font-family: monospace, 'Segoe UI Emoji';
            cursor: pointer;
            box-shadow: 0 5px 0 #aa8c54;
            transition: 0.07s linear;
            color: #2c1a0c;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        button:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #aa8c54;
        }

        .restart-btn {
            background: #ffb347;
            color: #2a2000;
            font-size: 1.5rem;
        }

        .instruction {
            background: #00000088;
            border-radius: 48px;
            padding: 8px 16px;
            text-align: center;
            color: #f9e2a1;
            font-weight: bold;
            font-size: 0.9rem;
            backdrop-filter: blur(4px);
            margin-top: 16px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .instruction span {
            background: #1f1a2e;
            padding: 4px 12px;
            border-radius: 40px;
        }

        @media (max-width: 550px) {
            .stats { font-size: 1rem; }
            .score-value, .best-value { font-size: 1.5rem; }
            button { font-size: 1.3rem; padding: 6px 20px; }
            .instruction { font-size: 0.7rem; }
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <div class="game-panel">
            <div class="stats">
                <div class="score-box">
                    <span>🏆 SCORE</span>
                    <span class="score-value" id="scoreDisplay">0</span>
                </div>
                <div class="best-box">
                    <span>⭐ RECORDE</span>
                    <span class="best-value" id="bestDisplay">0</span>
                </div>
            </div>
            <div class="track">
                <canvas id="gameCanvas" width="700" height="400"></canvas>
            </div>
            <div class="controls">
                <button id="leftBtn">◀  ESQUERDA</button>
                <button id="rightBtn">DIREITA  ▶</button>
                <button id="restartBtn" class="restart-btn">🔄 REINICIAR</button>
            </div>
            <div class="instruction">
                <span>🎮 SETAS ◀ ▶</span>
                <span>🚗 🏁 DESVIAR DOS 🚧</span>
                <span>💥 ⚡ SE BATER, GAME OVER</span>
            </div>
        </div>
    </div>
</div>

<script>
    (function(){
        // ---------- CONFIGURAÇÕES EMOCIONANTES ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Dimensões da pista (faixas horizontais)
        const LANE_COUNT = 5;
        const LANE_HEIGHT = canvas.height / LANE_COUNT; // 400/5 = 80px
        // O carro fica fixo na penúltima faixa (posição Y da base) - escolhemos a faixa 3 de 0 a 4 (index 3)
        const PLAYER_LANE_INDEX = 3;   // linha de baixo (quarta faixa) -> emocionante e visível
        const PLAYER_Y = PLAYER_LANE_INDEX * LANE_HEIGHT + (LANE_HEIGHT/2);
        
        // Dados do jogador
        let playerLane = 2;      // lane index 0-4, começa no meio (lane 2)
        let score = 0;
        let bestScore = localStorage.getItem('emojiRaceBest') ? parseInt(localStorage.getItem('emojiRaceBest')) : 0;
        let gameActive = true;
        let frameRequest;
        
        // Lista de obstáculos (inimigos) que descem / ou melhor: aparecem no topo e descem em direção ao jogador
        // Cada obstáculo: { x (lane index 0-4), y (posição vertical em pixels, de 0 até canvas.height), emoji }
        let obstacles = [];
        
        // Controle de spawn
        let frameCounter = 0;
        let spawnGap = 45;       // frames entre geração (quanto menor, mais difícil)
        let baseSpeed = 2.2;     // velocidade de descida (pixels por frame)
        
        // Ajuste dinâmico de dificuldade
        let difficultyRamp = 1;
        
        // Emoticons divertidos!
        const PLAYER_EMOJI = "🏎️";      // carro esporte
        const OBSTACLE_EMOJIS = ["🚧", "🪨", "🌵", "🧱", "⛔", "🚓", "💣", "🛑"];
        
        // Atualiza display do score
        const scoreSpan = document.getElementById('scoreDisplay');
        const bestSpan = document.getElementById('bestDisplay');
        bestSpan.innerText = bestScore;
        
        function updateUI() {
            scoreSpan.innerText = score;
            if(score > bestScore) {
                bestScore = score;
                bestSpan.innerText = bestScore;
                localStorage.setItem('emojiRaceBest', bestScore);
            }
        }
        
        // Inicializar ou resetar jogo
        function resetGame() {
            gameActive = true;
            score = 0;
            playerLane = 2;
            obstacles = [];
            frameCounter = 0;
            baseSpeed = 2.2;
            difficultyRamp = 1;
            updateUI();
        }
        
        // Game Over
        function endGame() {
            if(!gameActive) return;
            gameActive = false;
            updateUI(); // mantém score final
        }
        
        // Gerar novo obstáculo na pista superior (y = 0 até um pouco acima)
        function spawnObstacle() {
            if(!gameActive) return;
            // lane aleatória entre 0 e LANE_COUNT-1
            const lane = Math.floor(Math.random() * LANE_COUNT);
            // Evitar spawn excessivamente na mesma linha do jogador quando já existem muitos? Não precisa, desafio justo.
            const randomEmoji = OBSTACLE_EMOJIS[Math.floor(Math.random() * OBSTACLE_EMOJIS.length)];
            obstacles.push({
                lane: lane,
                y: -20,   // começa fora do topo (suave)
                emoji: randomEmoji,
                width: 34,   // para colisão (aproximado)
                height: 34
            });
        }
        
        // Movimentação do player (esquerda/direita)
        function movePlayer(delta) {
            if(!gameActive) return;
            let newLane = playerLane + delta;
            if(newLane >= 0 && newLane < LANE_COUNT) {
                playerLane = newLane;
            }
        }
        
        // Atualizar lógica (posição obstáculos, colisões, score)
        function updateGame() {
            if(!gameActive) return;
            
            // 1. Dificuldade progressiva: conforme score aumenta, aumenta velocidade e menor spawnGap
            let currentSpeed = baseSpeed + Math.floor(score / 350) * 0.5;
            currentSpeed = Math.min(currentSpeed, 5.8); // velocidade máxima
            let currentSpawnGap = Math.max(22, spawnGap - Math.floor(score / 280));
            
            // 2. Mover obstáculos para baixo
            for(let i=0; i<obstacles.length; i++) {
                obstacles[i].y += currentSpeed;
            }
            
            // 3. Filtrar obstáculos que saíram da tela (y > canvas.height) e também adicionar pontos por ultrapassar segurança?
            // Regra: passageiro seguro: quando o obstáculo ultrapassa a linha do jogador sem colidir, dá pontos? Vamos adotar:
            // Se um obstáculo ultrapassar o Y do jogador (PLAYER_Y + margem) e ainda não foi contabilizado, marca como "passou" e soma pontos.
            // Muitos jogos recompensam evitar obstáculos, assim fica divertido.
            // Para isso, cada obstáculo terá flag 'counted'
            for(let i=0; i<obstacles.length; i++) {
                if(!obstacles[i].counted && obstacles[i].y + 20 > PLAYER_Y) {
                    // Obstáculo cruzou a altura do jogador sem colidir? só marcar se ainda não colidiu, mas a colisão é prioridade.
                    // Marcar como contado apenas se não houver colisão nesse momento. Mas vamos usar a lógica de colisão separadamente.
                    // Para evitar double, a flag será ativada só depois de passar com segurança.
                    // Porém a colisão acontece se o obstáculo estiver na mesma faixa e recobrir a área do player.
                    // Se não colidiu, ao ultrapassar +20 pixels abaixo do player, então somamos ponto.
                    if(obstacles[i].y > PLAYER_Y + 15 && !obstacles[i].safeAwarded) {
                        obstacles[i].safeAwarded = true;
                        score += 10;
                        updateUI();
                    }
                }
            }
            
            // 4. Colisão (precisa verificar com hitbox)
            const playerHitRadius = 24;    // tamanho aproximado do emoticon
            const playerCenterX = (playerLane * LANE_HEIGHT) + (LANE_HEIGHT/2);
            const playerCenterY = PLAYER_Y;
            
            for(let i=0; i<obstacles.length; i++) {
                const obs = obstacles[i];
                const obsCenterX = (obs.lane * LANE_HEIGHT) + (LANE_HEIGHT/2);
                const obsCenterY = obs.y + 18; // centro aproximado
                const dx = playerCenterX - obsCenterX;
                const dy = playerCenterY - obsCenterY;
                const distance = Math.sqrt(dx*dx + dy*dy);
                if(distance < 32) { // colidiu!
                    endGame();
                    break; // para de checar porque o jogo acabou
                }
            }
            
            // Se o jogo acabou após colisão, não spawna novos obstáculos e não avança mais lógica
            if(!gameActive) return;
            
            // 5. Remover obstáculos que saíram totalmente da tela (y > canvas.height + 40)
            obstacles = obstacles.filter(obs => obs.y < canvas.height + 50);
            
            // 6. Spawn de novos obstáculos (controle de frames)
            frameCounter++;
            let dynamicSpawnDelay = Math.max(22, currentSpawnGap);
            if(frameCounter >= dynamicSpawnDelay) {
                frameCounter = 0;
                spawnObstacle();
                // Pequena chance dupla em altas pontuações = emoção!
                if(score > 800 && Math.random() < 0.25) {
                    spawnObstacle();
                }
            }
            
            // Bônus extra de dificuldade: adiciona mais velocidade para scores altos
        }
        
        // ---------- DESENHO DO JOGO (Tudo com emoticons e estilo vibrante) ----------
        function drawTrack() {
            // Desenhar faixas e asfalto
            for(let i=0; i<LANE_COUNT; i++) {
                let y = i * LANE_HEIGHT;
                let isEven = i % 2 === 0;
                ctx.fillStyle = isEven ? '#3e2c24' : '#4f382a';
                ctx.fillRect(0, y, canvas.width, LANE_HEIGHT);
                // Linhas divisórias tracejadas (estilo pista)
                ctx.beginPath();
                ctx.strokeStyle = '#efcd91';
                ctx.lineWidth = 2.5;
                ctx.setLineDash([12, 20]);
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
                // colocar uns detalhes de grama lateral
                ctx.fillStyle = '#8bb56a';
                ctx.fillRect(0, y+LANE_HEIGHT-6, 12, 6);
                ctx.fillRect(canvas.width-12, y+LANE_HEIGHT-6, 12, 6);
            }
            ctx.setLineDash([]);
            // linha de chegada? não, linha do player (efeito visual)
            ctx.beginPath();
            ctx.strokeStyle = '#ffcf40';
            ctx.lineWidth = 3;
            ctx.setLineDash([10, 15]);
            ctx.moveTo(0, PLAYER_Y+12);
            ctx.lineTo(canvas.width, PLAYER_Y+12);
            ctx.stroke();
            ctx.setLineDash([]);
            
            // Faixa de "sombra" do player
            ctx.shadowBlur = 0;
        }
        
        function drawObstacles() {
            for(let obs of obstacles) {
                const laneX = obs.lane * LANE_HEIGHT;
                const centerX = laneX + LANE_HEIGHT/2;
                const yPos = obs.y;
                // desenha um círculo decorativo tipo "perigo"
                ctx.font = `${LANE_HEIGHT-12}px "Segoe UI Emoji", "Apple Color Emoji", monospace`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.shadowBlur = 6;
                ctx.shadowColor = "black";
                ctx.fillStyle = "#111";
                ctx.fillText(obs.emoji, centerX+1, yPos+22);
                ctx.fillStyle = "#fff9e0";
                ctx.fillText(obs.emoji, centerX, yPos+21);
                ctx.fillStyle = "#ffffff";
                ctx.fillText(obs.emoji, centerX-1, yPos+20);
                // efeito brilho
                ctx.fillStyle = "#ffdd99";
                ctx.fillText(obs.emoji, centerX, yPos+20);
            }
        }
        
        function drawPlayer() {
            const laneX = playerLane * LANE_HEIGHT;
            const centerX = laneX + LANE_HEIGHT/2;
            const playerY = PLAYER_Y;
            ctx.font = `${LANE_HEIGHT-8}px "Segoe UI Emoji", "Apple Color Emoji", monospace`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            // glow e efeito turbo
            ctx.shadowBlur = 14;
            ctx.shadowColor = "#ffaa33";
            for(let i=0;i<3;i++) {
                ctx.fillStyle = `rgba(255, 200, 50, ${0.3-i*0.1})`;
                ctx.fillText(PLAYER_EMOJI, centerX + (i-1)*2, playerY + (i-1)*1.5);
            }
            ctx.fillStyle = "#ffd966";
            ctx.fillText(PLAYER_EMOJI, centerX, playerY);
            ctx.fillStyle = "white";
            ctx.fillText(PLAYER_EMOJI, centerX-1, playerY-1);
            ctx.fillStyle = "#FFB347";
            ctx.fillText(PLAYER_EMOJI, centerX+1, playerY+1);
            ctx.fillStyle = "#F7D44A";
            ctx.fillText(PLAYER_EMOJI, centerX, playerY);
            
            // efeito de esteira
            ctx.font = "18px monospace";
            ctx.fillStyle = "#ffcf88";
            ctx.shadowBlur = 4;
            ctx.fillText("⚡", centerX-28, playerY+8);
            ctx.fillText("💨", centerX+24, playerY+5);
        }
        
        function drawGameStatus() {
            if(!gameActive) {
                ctx.font = `bold 38px "Segoe UI", "Courier New", monospace`;
                ctx.shadowBlur = 0;
                ctx.fillStyle = "#ff3a2f";
                ctx.shadowColor = "black";
                ctx.fillText("💥 GAME OVER 💥", canvas.width/2, canvas.height/3);
                ctx.font = `bold 22px monospace`;
                ctx.fillStyle = "#ffd966";
                ctx.fillText("Clique em REINICIAR ➕", canvas.width/2, canvas.height/2 + 30);
                // emoticon triste
                ctx.font = `48px "Segoe UI Emoji"`;
                ctx.fillStyle = "#ffffff";
                ctx.fillText("😭", canvas.width/2+80, canvas.height/2);
                ctx.fillText("💀", canvas.width/2-90, canvas.height/2);
            }
            
            // Mostrar dificuldade com emojis
            ctx.font = `bold 18px monospace`;
            ctx.fillStyle = "#fdebb3";
            ctx.shadowBlur = 2;
            ctx.fillText(`🏁 VELOCIDADE: ${(baseSpeed + Math.floor(score/350)*0.5).toFixed(1)}`, canvas.width-150, 35);
            ctx.fillText(`🚀 SCORE: ${score}`, 20, 40);
        }
        
        function drawBackgroundDetails() {
            // pequenas estrelas ou poeira na pista
            ctx.fillStyle = "#ddbb77";
            for(let i=0;i<6;i++) {
                let x = (Date.now() * 0.003 + i * 200) % canvas.width;
                ctx.beginPath();
                ctx.arc(x, canvas.height-15, 3,0,Math.PI*2);
                ctx.fill();
            }
        }
        
        function render() {
            if(!canvas || !ctx) return;
            drawTrack();
            drawObstacles();
            drawPlayer();
            drawBackgroundDetails();
            drawGameStatus();
        }
        
        // ----- Loop de animação principal -----
        function gameLoop() {
            if(gameActive) {
                updateGame();   // atualiza física, colisões, score e spawns
            }
            render();
            frameRequest = requestAnimationFrame(gameLoop);
        }
        
        // ----- Controles via teclado e botões -----
        function handleKeyDown(e) {
            if(!gameActive) return;
            if(e.key === 'ArrowLeft') {
                movePlayer(-1);
                e.preventDefault();
            } else if(e.key === 'ArrowRight') {
                movePlayer(1);
                e.preventDefault();
            }
        }
        
        // reiniciar jogo manualmente
        function restartGame() {
            resetGame();
            // limpa lista de obstáculos e reinicia spawn
            obstacles = [];
            frameCounter = 0;
            gameActive = true;
            score = 0;
            playerLane = 2;
            updateUI();
        }
        
        // eventos e listeners
        window.addEventListener('load', () => {
            resetGame();  // score zero e recorde carregado
            // Registrar eventos
            window.addEventListener('keydown', handleKeyDown);
            document.getElementById('leftBtn').addEventListener('click', () => movePlayer(-1));
            document.getElementById('rightBtn').addEventListener('click', () => movePlayer(1));
            document.getElementById('restartBtn').addEventListener('click', () => {
                restartGame();
            });
            // touch/mobile evitar zoom nos botões
            const btns = document.querySelectorAll('button');
            btns.forEach(btn => {
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    if(btn.id === 'leftBtn') movePlayer(-1);
                    if(btn.id === 'rightBtn') movePlayer(1);
                    if(btn.id === 'restartBtn') restartGame();
                });
            });
            // Ajustar canvas para resolução fixa, mas adicionar responsividade mínima
            function resizeCanvas() {
                // mantém tamanho definido
                canvas.width = 700;
                canvas.height = 400;
                render();
            }
            resizeCanvas();
            gameLoop();
        });
        
        // Prevenir rolagem da página com setas
        window.addEventListener('keydown', function(e) {
            if(e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
                if(e.target === document.body || e.target === document.documentElement) {
                    e.preventDefault();
                }
            }
        });
    })();
</script>
</body>
</html>
