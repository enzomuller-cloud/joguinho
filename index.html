<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🏁 EMOJI RACER | Hitbox Corrigida 🚗💨</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #050510 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', monospace;
            padding: 20px;
            overflow-x: hidden;
        }

        .game-container {
            background: linear-gradient(145deg, #1a1a2e 0%, #0f0f1a 100%);
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.6), inset 0 1px 2px rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
        }

        .game-panel {
            background: linear-gradient(135deg, #14142a 0%, #0a0a18 100%);
            border-radius: 32px;
            padding: 20px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 5px 0 #2a1f0e;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, #1a1a35 0%, #101020 100%);
            padding: 12px 28px;
            border-radius: 60px;
            margin-bottom: 20px;
            gap: 15px;
            flex-wrap: wrap;
            border: 1px solid rgba(255,215,0,0.3);
        }

        .card {
            background: linear-gradient(145deg, #000000aa, #0a0a1aaa);
            backdrop-filter: blur(8px);
            padding: 6px 20px;
            border-radius: 40px;
            display: flex;
            align-items: baseline;
            gap: 10px;
            font-weight: bold;
            color: #ffe6aa;
            font-size: 1.1rem;
            border: 1px solid rgba(255,200,100,0.3);
        }

        .card span:first-child {
            font-size: 1.2rem;
            text-shadow: 0 0 5px rgba(255,200,0,0.5);
        }

        .value {
            font-size: 1.8rem;
            font-weight: 800;
            font-family: 'Courier New', monospace;
            color: #ffdf7e;
            line-height: 1;
            text-shadow: 0 0 10px #ffaa33;
        }

        .danger-value {
            color: #ff6666;
            text-shadow: 0 0 10px #ff0000;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .track-container {
            background: linear-gradient(145deg, #1a1510 0%, #0d0a07 100%);
            border-radius: 28px;
            padding: 12px;
            border: 2px solid #b87c3a;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.8), 0 10px 25px black;
        }

        canvas {
            display: block;
            margin: 0 auto;
            background: #1a1a1a;
            border-radius: 24px;
            cursor: pointer;
            box-shadow: 0 0 0 3px rgba(245,188,110,0.5), 0 8px 30px rgba(0,0,0,0.5);
        }

        .control-bar {
            margin-top: 24px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(145deg, #ffdd88, #ffaa33);
            border: none;
            font-size: 1.4rem;
            padding: 10px 28px;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 0 #aa6a1a;
            transition: 0.07s linear;
            color: #2d1b08;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        button:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #aa6a1a;
        }

        .restart-btn {
            background: linear-gradient(145deg, #ff6644, #cc3322);
            color: white;
            text-shadow: 0 1px 2px black;
        }

        .legend {
            background: linear-gradient(135deg, #00000099, #00000077);
            backdrop-filter: blur(8px);
            margin-top: 16px;
            border-radius: 48px;
            padding: 8px 20px;
            display: flex;
            justify-content: center;
            gap: 25px;
            font-size: 0.8rem;
            font-weight: bold;
            color: #ffe1a0;
            border: 1px solid rgba(255,200,100,0.3);
            flex-wrap: wrap;
        }

        .legend span {
            background: #1f1b2eaa;
            padding: 4px 14px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Modo debug - aperte D para mostrar hitboxes */
        .debug-note {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.5);
            color: #888;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            pointer-events: none;
        }

        @media (max-width: 650px) {
            .card { padding: 3px 12px; font-size: 0.9rem; }
            .value { font-size: 1.3rem; }
            button { font-size: 1.1rem; padding: 6px 18px; }
            .legend { font-size: 0.65rem; gap: 8px; }
            .legend span { padding: 3px 10px; }
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <div class="game-panel">
            <div class="stats">
                <div class="card">
                    <span>🏆 PONTOS</span>
                    <span class="value" id="scoreDisplay">0</span>
                </div>
                <div class="card">
                    <span>⭐ RECORDE</span>
                    <span class="value" id="bestDisplay">0</span>
                </div>
                <div class="card">
                    <span>⚡ VELOCIDADE</span>
                    <span class="value danger-value" id="speedDisplay">0</span>
                </div>
                <div class="card">
                    <span>📈 MULTIPLICADOR</span>
                    <span class="value" id="multiplierDisplay">1.0</span>
                </div>
            </div>
            <div class="track-container">
                <canvas id="gameCanvas" width="850" height="520"></canvas>
            </div>
            <div class="control-bar">
                <button id="upBtn">⬆️ SUBIR</button>
                <button id="downBtn">⬇️ DESCER</button>
                <button id="restartBtn" class="restart-btn">🔄 REINICIAR</button>
            </div>
            <div class="legend">
                <span>🚗 SEU CARRO ➡️</span>
                <span>🚕 🚙 🚓 INIMIGOS ←</span>
                <span>💥 COLISÃO = GAME OVER</span>
                <span>✨ HITBOX CORRIGIDA</span>
            </div>
        </div>
    </div>
</div>
<div class="debug-note">🔧 Hitbox ajustada | Aperte D para debug</div>

<script>
    (function(){
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // ========== EMOJIS DE CARROS ==========
        const PLAYER_EMOJI = "🚗";
        const ENEMY_EMOJIS = ["🚕", "🚙", "🚓", "🚑", "🚒", "🚐", "🛻", "🏎️", "🚘", "🚖"];
        
        // CONFIGURAÇÕES
        const LANE_COUNT = 5;
        const LANE_HEIGHT = canvas.height / LANE_COUNT;
        
        let playerLane = 2;
        const PLAYER_X = 110;
        
        // TAMANHO REAL DOS CARROS (hitbox precisa)
        const CAR_WIDTH = 48;
        const CAR_HEIGHT = 48;
        
        // Posição central do player para hitbox
        const getPlayerRect = () => ({
            x: PLAYER_X - CAR_WIDTH/2 + 8,
            y: playerLane * LANE_HEIGHT + (LANE_HEIGHT/2) - CAR_HEIGHT/2,
            w: CAR_WIDTH - 8,
            h: CAR_HEIGHT - 6
        });
        
        // Posição central dos obstáculos para hitbox
        const getObstacleRect = (obs) => ({
            x: obs.x + 8,
            y: obs.lane * LANE_HEIGHT + (LANE_HEIGHT/2) - CAR_HEIGHT/2,
            w: CAR_WIDTH - 12,
            h: CAR_HEIGHT - 8
        });
        
        // Modo debug (mostrar hitboxes)
        let debugMode = false;
        document.addEventListener('keydown', (e) => {
            if(e.key === 'd' || e.key === 'D') {
                debugMode = !debugMode;
            }
        });
        
        let score = 0;
        let bestScore = localStorage.getItem('emojiCarRaceFixed') ? parseInt(localStorage.getItem('emojiCarRaceFixed')) : 0;
        let gameActive = true;
        
        let obstacles = [];
        let frameCounter = 0;
        let baseSpawnGap = 42;
        let baseSpeed = 2.2;
        
        // Efeitos visuais
        let particles = [];
        let screenShake = 0;
        let speedLines = [];
        let nitroEffect = 0;
        let trailEffect = [];
        let floatingTexts = [];
        let lastBonus = 0;
        
        const scoreSpan = document.getElementById('scoreDisplay');
        const bestSpan = document.getElementById('bestDisplay');
        const speedSpan = document.getElementById('speedDisplay');
        const multiplierSpan = document.getElementById('multiplierDisplay');
        bestSpan.innerText = bestScore;
        
        function getCurrentSpeed() {
            let speedBonus = Math.floor(score / 150) * 0.4;
            let speed = baseSpeed + speedBonus;
            speed = Math.min(speed, 9.0);
            return speed;
        }
        
        function updateMultiplier() {
            let speed = getCurrentSpeed();
            let mult = parseFloat((speed / baseSpeed).toFixed(1));
            multiplierSpan.innerText = mult;
            if(mult >= 2.5) {
                multiplierSpan.style.color = "#ff4444";
                multiplierSpan.style.textShadow = "0 0 15px #ff0000";
            } else if(mult >= 1.8) {
                multiplierSpan.style.color = "#ff8844";
                multiplierSpan.style.textShadow = "0 0 10px #ff6600";
            } else {
                multiplierSpan.style.color = "#ffdf7e";
                multiplierSpan.style.textShadow = "0 0 10px #ffaa33";
            }
        }
        
        function getCurrentSpawnGap() {
            return Math.max(16, baseSpawnGap - Math.floor(score / 180));
        }
        
        function updateUI() {
            scoreSpan.innerText = Math.floor(score);
            let currentSpeed = getCurrentSpeed();
            speedSpan.innerText = currentSpeed.toFixed(1);
            
            if(currentSpeed >= 6.0) {
                speedSpan.classList.add('danger-value');
            } else {
                speedSpan.classList.remove('danger-value');
            }
            
            if(score > bestScore) {
                bestScore = Math.floor(score);
                bestSpan.innerText = bestScore;
                localStorage.setItem('emojiCarRaceFixed', bestScore);
            }
            updateMultiplier();
        }
        
        function resetGame() {
            gameActive = true;
            score = 0;
            playerLane = 2;
            obstacles = [];
            particles = [];
            speedLines = [];
            trailEffect = [];
            floatingTexts = [];
            frameCounter = 0;
            baseSpeed = 2.2;
            lastBonus = 0;
            screenShake = 0;
            nitroEffect = 0;
            updateUI();
        }
        
        function endGame() {
            if(!gameActive) return;
            gameActive = false;
            screenShake = 25;
            for(let i = 0; i < 70; i++) {
                particles.push({
                    x: PLAYER_X,
                    y: playerLane * LANE_HEIGHT + (LANE_HEIGHT/2),
                    vx: (Math.random() - 0.5) * 16,
                    vy: (Math.random() - 0.5) * 16,
                    life: 50,
                    size: Math.random() * 6 + 2,
                    color: `hsl(${Math.random() * 60 + 20}, 100%, 55%)`
                });
            }
            updateUI();
        }
        
        function spawnObstacle() {
            if(!gameActive) return;
            const lane = Math.floor(Math.random() * LANE_COUNT);
            const randomEmoji = ENEMY_EMOJIS[Math.floor(Math.random() * ENEMY_EMOJIS.length)];
            obstacles.push({
                lane: lane,
                x: canvas.width + 60,
                emoji: randomEmoji,
                counted: false,
                colided: false
            });
        }
        
        function movePlayer(deltaY) {
            if(!gameActive) return;
            let newLane = playerLane + deltaY;
            if(newLane >= 0 && newLane < LANE_COUNT) {
                playerLane = newLane;
                for(let i = 0; i < 12; i++) {
                    particles.push({
                        x: PLAYER_X - 20,
                        y: playerLane * LANE_HEIGHT + (LANE_HEIGHT/2),
                        vx: (Math.random() - 0.5) * 5 - 3,
                        vy: (Math.random() - 0.5) * 4,
                        life: 20,
                        size: Math.random() * 4 + 1,
                        color: `hsl(45, 100%, 55%)`
                    });
                }
            }
        }
        
        function showFloatingText(text, lane, xPos) {
            floatingTexts.push({
                text: text,
                x: xPos !== undefined ? xPos : PLAYER_X,
                y: lane * LANE_HEIGHT + LANE_HEIGHT/2,
                life: 50
            });
        }
        
        function updateGame() {
            if(!gameActive) return;
            
            let currentSpeed = getCurrentSpeed();
            let currentSpawnGap = getCurrentSpawnGap();
            
            // Mover obstáculos
            for(let i = 0; i < obstacles.length; i++) {
                obstacles[i].x -= currentSpeed;
            }
            
            // Pontuação
            for(let i = 0; i < obstacles.length; i++) {
                const obs = obstacles[i];
                if(!obs.counted && obs.x + CAR_WIDTH/2 < PLAYER_X - CAR_WIDTH/4) {
                    if(gameActive && !obs.colided) {
                        obs.counted = true;
                        let pointsGain = 10;
                        score += pointsGain;
                        updateUI();
                        showFloatingText(`+${pointsGain}`, obs.lane, obs.x);
                        
                        for(let p = 0; p < 12; p++) {
                            particles.push({
                                x: obs.x + 35,
                                y: obs.lane * LANE_HEIGHT + LANE_HEIGHT/2,
                                vx: (Math.random() - 0.5) * 6,
                                vy: (Math.random() - 0.5) * 6 - 3,
                                life: 25,
                                size: Math.random() * 4 + 1,
                                color: `hsl(${Math.random() * 60 + 40}, 100%, 60%)`
                            });
                        }
                    }
                }
            }
            
            // COLISÃO - Hitbox precisa baseada no tamanho real dos carros
            const playerRect = getPlayerRect();
            
            for(let i = 0; i < obstacles.length; i++) {
                const obs = obstacles[i];
                const obsRect = getObstacleRect(obs);
                
                // Detecção de colisão com hitbox retangular precisa
                if(playerRect.x < obsRect.x + obsRect.w &&
                   playerRect.x + playerRect.w > obsRect.x &&
                   playerRect.y < obsRect.y + obsRect.h &&
                   playerRect.y + playerRect.h > obsRect.y) {
                    obs.colided = true;
                    endGame();
                    break;
                }
            }
            
            if(!gameActive) return;
            
            // Remover obstáculos
            obstacles = obstacles.filter(obs => obs.x > -100);
            
            // Spawn
            frameCounter++;
            if(frameCounter >= currentSpawnGap) {
                frameCounter = 0;
                spawnObstacle();
                if(currentSpeed > 5.8 && Math.random() < 0.3) {
                    spawnObstacle();
                }
            }
            
            // Bônus
            if(score > 0 && Math.floor(score) % 100 === 0 && score !== 0 && lastBonus !== Math.floor(score)) {
                lastBonus = Math.floor(score);
                let bonusAmount = Math.floor(25 + currentSpeed * 2);
                showFloatingText(`🏆 +${bonusAmount}`, playerLane, PLAYER_X);
                score += bonusAmount;
                updateUI();
                nitroEffect = 25;
                
                for(let i = 0; i < 35; i++) {
                    particles.push({
                        x: PLAYER_X,
                        y: playerLane * LANE_HEIGHT + (LANE_HEIGHT/2),
                        vx: (Math.random() - 0.5) * 8,
                        vy: (Math.random() - 0.5) * 8 - 4,
                        life: 35,
                        size: Math.random() * 5 + 1,
                        color: `hsl(${Math.random() * 60 + 30}, 100%, 55%)`
                    });
                }
            }
            
            // Efeitos
            if(currentSpeed > 3.5) {
                if(Math.random() < 0.4) {
                    speedLines.push({
                        x: Math.random() * canvas.width,
                        y: 0,
                        width: Math.random() * 5 + 2,
                        height: Math.random() * 100 + 40,
                        speed: currentSpeed * 2.8,
                        alpha: Math.random() * 0.5 + 0.2
                    });
                }
                
                if(Math.random() < 0.35) {
                    trailEffect.push({
                        x: PLAYER_X - 15,
                        y: playerLane * LANE_HEIGHT + (LANE_HEIGHT/2),
                        life: 18,
                        size: Math.random() * 8 + 4
                    });
                }
            }
            
            // Atualizações
            for(let i = 0; i < speedLines.length; i++) {
                speedLines[i].y += speedLines[i].speed;
                if(speedLines[i].y > canvas.height) {
                    speedLines.splice(i,1);
                    i--;
                }
            }
            
            for(let i = 0; i < trailEffect.length; i++) {
                trailEffect[i].life--;
                if(trailEffect[i].life <= 0) {
                    trailEffect.splice(i,1);
                    i--;
                }
            }
            
            if(nitroEffect > 0) nitroEffect--;
            if(screenShake > 0) screenShake--;
        }
        
        // DESENHO
        function drawTrack() {
            const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grad.addColorStop(0, '#1e1810');
            grad.addColorStop(1, '#0f0b07');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            for(let i = 0; i < LANE_COUNT; i++) {
                let y = i * LANE_HEIGHT;
                let gradLane = ctx.createLinearGradient(0, y, canvas.width, y);
                gradLane.addColorStop(0, i % 2 === 0 ? '#3a2a1c' : '#4a3824');
                gradLane.addColorStop(1, i % 2 === 0 ? '#251e12' : '#352818');
                ctx.fillStyle = gradLane;
                ctx.fillRect(0, y, canvas.width, LANE_HEIGHT);
                
                ctx.beginPath();
                ctx.strokeStyle = i === playerLane ? '#ffaa44' : '#c4a060';
                ctx.lineWidth = 2.5;
                ctx.setLineDash([15, 25]);
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
                
                ctx.fillStyle = '#6a9a4a';
                ctx.fillRect(0, y+LANE_HEIGHT-4, canvas.width, 3);
            }
            ctx.setLineDash([]);
            
            ctx.shadowBlur = 8;
            ctx.shadowColor = '#ffaa44';
            ctx.beginPath();
            ctx.strokeStyle = '#ffcc55';
            ctx.lineWidth = 3;
            ctx.moveTo(PLAYER_X + 35, 0);
            ctx.lineTo(PLAYER_X + 35, canvas.height);
            ctx.stroke();
            ctx.shadowBlur = 0;
            
            ctx.font = "bold 13px monospace";
            ctx.fillStyle = "#ffaa66aa";
            ctx.fillText("🟢 ZONA SEGURA", PLAYER_X - 80, 30);
            ctx.fillStyle = "#ff6644aa";
            ctx.fillText("⚠️ PERIGO ⚠️", canvas.width - 130, 30);
        }
        
        function drawObstacles() {
            for(let i = 0; i < obstacles.length; i++) {
                const obs = obstacles[i];
                const centerY = obs.lane * LANE_HEIGHT + (LANE_HEIGHT/2);
                const xPos = obs.x;
                
                ctx.save();
                ctx.shadowBlur = 10;
                ctx.shadowColor = "rgba(0,0,0,0.7)";
                ctx.font = `46px "Segoe UI Emoji", "Apple Color Emoji", monospace`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                
                ctx.fillStyle = "#000000aa";
                ctx.fillText(obs.emoji, xPos + 2, centerY + 2);
                ctx.fillStyle = "#ffffffdd";
                ctx.fillText(obs.emoji, xPos - 1, centerY - 1);
                ctx.fillStyle = "#ffcc88";
                ctx.fillText(obs.emoji, xPos, centerY);
                
                // Hitbox debug
                if(debugMode) {
                    const rect = getObstacleRect(obs);
                    ctx.strokeStyle = "#00ff00";
                    ctx.lineWidth = 2;
                    ctx.strokeRect(rect.x, rect.y, rect.w, rect.h);
                }
                
                ctx.restore();
            }
        }
        
        function drawTrail() {
            for(let i = 0; i < trailEffect.length; i++) {
                const t = trailEffect[i];
                ctx.fillStyle = `rgba(255, 100, 50, ${t.life/18 * 0.5})`;
                ctx.beginPath();
                ctx.ellipse(t.x, t.y, t.size, t.size * 0.6, 0, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        function drawPlayer() {
            const playerX = PLAYER_X + (screenShake > 0 ? (Math.random() - 0.5) * 4 : 0);
            const playerY = playerLane * LANE_HEIGHT + (LANE_HEIGHT/2);
            
            ctx.save();
            ctx.shadowBlur = 18;
            ctx.shadowColor = "#ffaa33";
            
            if(nitroEffect > 0) {
                ctx.shadowBlur = 35;
                ctx.shadowColor = "#ff4400";
                for(let i = 0; i < 6; i++) {
                    ctx.fillStyle = `rgba(255, 80, 0, ${0.5 - i*0.08})`;
                    ctx.fillText("🔥", playerX - 45 + i*10, playerY + 5);
                }
            }
            
            ctx.font = `52px "Segoe UI Emoji", "Apple Color Emoji", monospace`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            
            ctx.fillStyle = "#000000aa";
            ctx.fillText(PLAYER_EMOJI, playerX + 2, playerY + 2);
            ctx.fillStyle = "#ffdd88";
            ctx.fillText(PLAYER_EMOJI, playerX, playerY);
            ctx.fillStyle = "#ffffff";
            ctx.fillText(PLAYER_EMOJI, playerX - 1, playerY - 1);
            ctx.fillStyle = "#ffaa44";
            ctx.fillText(PLAYER_EMOJI, playerX + 1, playerY + 1);
            
            ctx.fillStyle = "#ffff88dd";
            ctx.font = "22px monospace";
            ctx.fillText("➡️", playerX + 28, playerY);
            
            // Hitbox debug do player
            if(debugMode) {
                const rect = getPlayerRect();
                ctx.strokeStyle = "#ff0000";
                ctx.lineWidth = 2;
                ctx.strokeRect(rect.x, rect.y, rect.w, rect.h);
                ctx.fillStyle = "#ff000088";
                ctx.fillRect(rect.x, rect.y, rect.w, rect.h);
            }
            
            ctx.restore();
        }
        
        function drawSpeedLines() {
            for(let i = 0; i < speedLines.length; i++) {
                const line = speedLines[i];
                ctx.fillStyle = `rgba(255, 220, 100, ${line.alpha})`;
                ctx.fillRect(line.x, line.y, line.width, line.height);
            }
        }
        
        function drawParticles() {
            for(let i = 0; i < particles.length; i++) {
                const p = particles[i];
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 5;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                if(p.life <= 0) {
                    particles.splice(i,1);
                    i--;
                }
            }
            ctx.shadowBlur = 0;
        }
        
        function drawFloatingEffects() {
            for(let i = 0; i < floatingTexts.length; i++) {
                const t = floatingTexts[i];
                ctx.font = "bold 24px 'Segoe UI', monospace";
                ctx.shadowBlur = 6;
                ctx.fillStyle = `rgba(255, 235, 100, ${t.life/50})`;
                ctx.fillText(t.text, t.x, t.y - (45 - t.life));
                t.life--;
                if(t.life <= 0) {
                    floatingTexts.splice(i,1);
                    i--;
                }
            }
            ctx.shadowBlur = 0;
        }
        
        function drawGameStatus() {
            if(!gameActive) {
                ctx.fillStyle = "rgba(0,0,0,0.94)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.font = `bold 44px "Segoe UI", "Poppins", monospace`;
                ctx.textAlign = "center";
                ctx.fillStyle = "#ff4444";
                ctx.shadowBlur = 0;
                ctx.fillText("💥 GAME OVER 💥", canvas.width/2, canvas.height/2 - 60);
                
                ctx.font = `bold 26px monospace`;
                ctx.fillStyle = "#ffcc66";
                ctx.fillText("Clique em REINICIAR", canvas.width/2, canvas.height/2 + 20);
                
                ctx.font = `24px monospace`;
                ctx.fillStyle = "#ffaa88";
                ctx.fillText(`🏁 PONTUAÇÃO FINAL: ${Math.floor(score)} 🏁`, canvas.width/2, canvas.height/2 + 80);
                
                let maxSpeed = getCurrentSpeed();
                ctx.font = `20px monospace`;
                ctx.fillStyle = "#ffaa66";
                ctx.fillText(`⚡ VELOCIDADE MÁXIMA: ${maxSpeed.toFixed(1)} ⚡`, canvas.width/2, canvas.height/2 + 130);
                
                ctx.textAlign = "left";
            }
        }
        
        function render() {
            if(screenShake > 0) {
                ctx.save();
                ctx.translate((Math.random() - 0.5) * 6, (Math.random() - 0.5) * 6);
            }
            drawTrack();
            drawObstacles();
            drawTrail();
            drawPlayer();
            drawSpeedLines();
            drawParticles();
            drawFloatingEffects();
            drawGameStatus();
            
            if(debugMode && gameActive) {
                ctx.font = "12px monospace";
                ctx.fillStyle = "#00ff00";
                ctx.shadowBlur = 0;
                ctx.fillText("🔧 DEBUG MODE - Hitboxes visíveis", 10, 20);
            }
            
            if(screenShake > 0) ctx.restore();
        }
        
        function gameLoop() {
            if(gameActive) updateGame();
            render();
            requestAnimationFrame(gameLoop);
        }
        
        function handleKeyDown(e) {
            if(!gameActive) return;
            if(e.key === 'ArrowUp') { movePlayer(-1); e.preventDefault(); }
            else if(e.key === 'ArrowDown') { movePlayer(1); e.preventDefault(); }
        }
        
        function restartGame() {
            resetGame();
            obstacles = [];
            particles = [];
            speedLines = [];
            trailEffect = [];
            floatingTexts = [];
            frameCounter = 0;
            gameActive = true;
            playerLane = 2;
            screenShake = 0;
            nitroEffect = 0;
            updateUI();
        }
        
        window.addEventListener('load', () => {
            resetGame();
            window.addEventListener('keydown', handleKeyDown);
            document.getElementById('upBtn').addEventListener('click', () => movePlayer(-1));
            document.getElementById('downBtn').addEventListener('click', () => movePlayer(1));
            document.getElementById('restartBtn').addEventListener('click', restartGame);
            
            document.querySelectorAll('button').forEach(btn => {
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    if(btn.id === 'upBtn') movePlayer(-1);
                    if(btn.id === 'downBtn') movePlayer(1);
                    if(btn.id === 'restartBtn') restartGame();
                });
            });
            
            gameLoop();
        });
        
        window.addEventListener('keydown', function(e) {
            if(e.key === 'ArrowUp' || e.key === 'ArrowDown') {
                if(e.target === document.body || e.target === document.documentElement) e.preventDefault();
            }
        });
    })();
</script>
</body>
</html>
